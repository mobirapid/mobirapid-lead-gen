<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Mobirapid Leads</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .auth-wrap { min-height: 80vh; display: grid; place-items: center; padding: 40px 20px; }
    .auth-card { width: 100%; max-width: 360px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; }
    .auth-card h1 { font-size: 1.3rem; margin: 0 0 4px; }
    .auth-card p { color: var(--muted); margin: 0 0 20px; font-size: 0.9rem; }
    .auth-card button { width: 100%; margin-top: 6px; border: none; border-radius: 12px; padding: 13px; background: var(--brand); color: #fff; font-weight: 700; cursor: pointer; }
    .auth-card button:hover { background: var(--brand-dark); }
    .err-msg { color: var(--err); font-size: 0.88rem; margin: 0 0 14px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="brand" style="margin-bottom:18px;">
        <span class="brand-mark">M</span><span class="brand-name">Mobirapid Admin</span>
      </div>
      <h1>Sign in</h1>
      <p>Access the lead dashboard.</p>
      <p class="err-msg" id="errMsg" hidden>Invalid username or password.</p>
      <form method="POST" action="/admin/login">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">Sign in</button>
      </form>
    </div>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errMsg').hidden = false;
    }
  </script>
</body>
</html>
